services:

  # ── TimescaleDB ───────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: obsidianwatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       obsidianwatch
      POSTGRES_USER:     obsidianwatch
      POSTGRES_PASSWORD: changeme        # ← CHANGE THIS (match server.yaml)
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"                      # expose for local psql access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obsidianwatch -d obsidianwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ObsidianWatch Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: obsidianwatch-backend
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      # Mount your server config and TLS certs
      - ./server.yaml:/app/server.yaml:ro
      - ./certs:/app/certs:ro
    environment:
      # Override config values via environment variables if preferred.
      # These are read by the Go binary only if you add env-var support.
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8443/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  timescale_data:
    driver: local
